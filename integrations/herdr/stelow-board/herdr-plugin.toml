id = "stelow.board"
name = "Stelow Board"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Persistent side panel showing stelow workflow stages, projects, scopes, and tasks with click-to-drill navigation."
platforms = ["linux", "macos"]

# Pane persistente (split). A SEMPRE docked right do pane ativo.
[[panes]]
id = "board"
title = "Workflow"
placement = "split"
command = ["./target/release/stelow-board"]

# Action invocável via key/palette. Idempotente (open/focus/close).
[[actions]]
id = "toggle"
title = "Toggle stelow board"
command = ["bash", "scripts/open-board.sh"]

# Keybinding nativa do herdr (opcional).
[[keys.command]]
key = "prefix+w"
type = "plugin_action"
command = "stelow.board.toggle"
description = "toggle stelow board"